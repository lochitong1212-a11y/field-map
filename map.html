<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>場況先知 - 澳門運動場地即時地圖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', '微軟正黑體', 'PingFang TC', 'Noto Sans TC', sans-serif;
            background: #f5faf7;
            color: #2c3e50;
            padding: 16px;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            padding: 16px 0 12px;
        }
        .header h1 {
            font-size: 22px;
            color: #1a3c2a;
            margin-bottom: 4px;
        }
        .header .sub {
            font-size: 13px;
            color: #6dbe8a;
            letter-spacing: 1px;
        }

        /* 地圖容器 */
        .map-container {
            background: #fff;
            border-radius: 18px;
            padding: 20px 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.05);
            margin-bottom: 16px;
            position: relative;
        }

        .map-title {
            font-size: 15px;
            font-weight: 600;
            color: #1a3c2a;
            margin-bottom: 14px;
            text-align: center;
        }

        /* 澳門簡易地圖區塊 */
        .macau-map {
            position: relative;
            width: 100%;
            height: 340px;
            background: #e8f5e9;
            border-radius: 14px;
            overflow: hidden;
            border: 2px solid #c8e0cc;
        }

        /* 澳門半島 */
        .peninsula {
            position: absolute;
            top: 60px;
            left: 20px;
            width: 130px;
            height: 110px;
            background: #d4e8d8;
            border-radius: 40% 50% 30% 50%;
            border: 2px solid #a0c0a6;
        }

        /* 氹仔 */
        .taipa {
            position: absolute;
            bottom: 100px;
            left: 130px;
            width: 80px;
            height: 50px;
            background: #d4e8d8;
            border-radius: 40% 40% 30% 30%;
            border: 2px solid #a0c0a6;
        }

        /* 路環 */
        .coloane {
            position: absolute;
            bottom: 40px;
            left: 160px;
            width: 60px;
            height: 70px;
            background: #d4e8d8;
            border-radius: 30% 40% 40% 30%;
            border: 2px solid #a0c0a6;
        }

        /* 場地標記點 */
        .marker {
            position: absolute;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 10;
            border: 2px solid #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .marker:hover {
            transform: scale(1.5);
            z-index: 20;
        }
        .marker-green {
            background: #3cb878;
            box-shadow: 0 0 12px #3cb878;
        }
        .marker-yellow {
            background: #e8a820;
            box-shadow: 0 0 12px #e8a820;
        }
        .marker-red {
            background: #d9444a;
            box-shadow: 0 0 12px #d9444a;
        }

        /* 場地標籤 */
        .label {
            position: absolute;
            font-size: 10px;
            font-weight: 600;
            color: #1a3c2a;
            background: rgba(255,255,255,0.85);
            padding: 2px 6px;
            border-radius: 8px;
            white-space: nowrap;
            pointer-events: none;
        }

        /* 圖例 */
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 12px;
            font-size: 12px;
            color: #555;
        }
        .legend span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .legend .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        /* 場地列表 */
        .venue-list {
            background: #fff;
            border-radius: 18px;
            padding: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.05);
            margin-bottom: 16px;
        }
        .venue-list h3 {
            font-size: 15px;
            color: #1a3c2a;
            margin-bottom: 10px;
        }
        .venue-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 8px;
            border-bottom: 1px solid #eee;
        }
        .venue-item:last-child {
            border-bottom: none;
        }
        .venue-item .name {
            font-weight: 500;
            font-size: 14px;
        }
        .venue-item .status {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 12px;
        }
        .status-g {
            background: #e8f5e9;
            color: #2a8a5a;
        }
        .status-y {
            background: #fff8e1;
            color: #b88018;
        }
        .status-r {
            background: #ffebee;
            color: #a03036;
        }

        /* 推薦區 */
        .recommend-box {
            background: #1a3c2a;
            color: #6dbe8a;
            text-align: center;
            padding: 14px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 500;
        }

        .refresh {
            text-align: center;
            margin-top: 12px;
            font-size: 11px;
            color: #8aa398;
        }

        .footer {
            text-align: center;
            padding: 12px;
            color: #8aa398;
            font-size: 11px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📍 場況先知</h1>
        <div class="sub">澳門公共運動場地即時狀態</div>
    </div>

    <!-- 地圖 -->
    <div class="map-container">
        <div class="map-title">🗺️ 澳門公共運動場地一覽</div>
        <div class="macau-map" id="map">
            <!-- 標記點由JS動態生成 -->
        </div>
        <div class="legend">
            <span><span class="dot" style="background:#3cb878;"></span> 空閒</span>
            <span><span class="dot" style="background:#e8a820;"></span> 擁擠</span>
            <span><span class="dot" style="background:#d9444a;"></span> 滿人</span>
        </div>
    </div>

    <!-- 場地列表 -->
    <div class="venue-list">
        <h3>📋 場地狀態列表</h3>
        <div id="venueListContainer"></div>
    </div>

    <!-- 推薦 -->
    <div class="recommend-box" id="recommendBox">
        💡 <strong>AI推薦：</strong><span id="recText"></span>
    </div>

    <div class="refresh">🔄 數據每30秒自動更新｜點擊地圖標記查看場地名稱</div>
    <div class="footer">場況先知 · 第六屆澳門聯校科學展覽</div>

<script>
    // 場地數據（模擬真實場地位置與狀態）
    const venues = [
        { id: 1, name: '鴨涌河公園', area: '澳門半島', lat: 25, lng: 70, status: 'red', type: '羽毛球場' },
        { id: 2, name: '筷子基公共球場', area: '澳門半島', lat: 15, lng: 52, status: 'yellow', type: '羽毛球場' },
        { id: 3, name: '筷子基海傍球場', area: '澳門半島', lat: 30, lng: 38, status: 'green', type: '羽毛球場' },
        { id: 4, name: '松山綜合廣場', area: '澳門半島', lat: 50, lng: 78, status: 'green', type: '羽毛球場' },
        { id: 5, name: '白鴿巢公園', area: '澳門半島', lat: 40, lng: 58, status: 'yellow', type: '羽毛球場' },
        { id: 6, name: '黑沙環公園', area: '澳門半島', lat: 12, lng: 80, status: 'red', type: '籃球場' },
        { id: 7, name: '氹仔中央公園', area: '氹仔', lat: 158, lng: 92, status: 'red', type: '羽毛球場' },
        { id: 8, name: '氹仔海濱休憩區', area: '氹仔', lat: 175, lng: 70, status: 'green', type: '羽毛球場' },
        { id: 9, name: '奧林匹克體育中心', area: '氹仔', lat: 148, lng: 112, status: 'yellow', type: '多功能' },
        { id: 10, name: '路環市區球場', area: '路環', lat: 195, lng: 55, status: 'green', type: '羽毛球場' },
        { id: 11, name: '黑沙海灘公園', area: '路環', lat: 210, lng: 30, status: 'green', type: '籃球場' },
    ];

    // 隨機更新狀態（模擬即時變化）
    function randomizeStatuses() {
        const statuses = ['green', 'yellow', 'red'];
        venues.forEach(v => {
            v.status = statuses[Math.floor(Math.random() * 3)];
        });
    }

    // 繪製地圖標記
    function renderMap() {
        const map = document.getElementById('map');
        // 清除舊標記
        map.querySelectorAll('.marker,.label').forEach(el => el.remove());

        venues.forEach(v => {
            const marker = document.createElement('div');
            marker.className = 'marker';
            if (v.status === 'green') marker.classList.add('marker-green');
            else if (v.status === 'yellow') marker.classList.add('marker-yellow');
            else marker.classList.add('marker-red');
            marker.style.top = v.lat + 'px';
            marker.style.left = v.lng + 'px';
            marker.title = v.name + ' - ' + (v.status === 'green' ? '空閒' : v.status === 'yellow' ? '擁擠' : '滿人');
            marker.onclick = function() {
                alert(v.name + '\n類型：' + v.type + '\n狀態：' + (v.status === 'green' ? '🟢 空閒' : v.status === 'yellow' ? '🟡 擁擠' : '🔴 滿人') + '\n區域：' + v.area);
            };
            map.appendChild(marker);

            const label = document.createElement('div');
            label.className = 'label';
            label.textContent = v.name;
            label.style.top = (v.lat + 18) + 'px';
            label.style.left = (v.lng - 10) + 'px';
            map.appendChild(label);
        });
    }

    // 繪製場地列表
    function renderList() {
        const container = document.getElementById('venueListContainer');
        container.innerHTML = '';
        venues.forEach(v => {
            const item = document.createElement('div');
            item.className = 'venue-item';
            const statusText = v.status === 'green' ? '🟢 空閒' : v.status === 'yellow' ? '🟡 擁擠' : '🔴 滿人';
            const statusClass = v.status === 'green' ? 'status-g' : v.status === 'yellow' ? 'status-y' : 'status-r';
            item.innerHTML = `
                <span class="name">${v.name} <small style="color:#888;">${v.type}·${v.area}</small></span>
                <span class="status ${statusClass}">${statusText}</span>
            `;
            container.appendChild(item);
        });
    }

    // AI推薦邏輯
    function updateRecommendation() {
        const greenVenues = venues.filter(v => v.status === 'green');
        const recText = document.getElementById('recText');
        if (greenVenues.length > 0) {
            const pick = greenVenues[Math.floor(Math.random() * greenVenues.length)];
            recText.textContent = `目前有空位！推薦前往「${pick.name}」(${pick.type}，${pick.area})`;
        } else {
            recText.textContent = '目前所有場地皆擁擠或滿人，建議稍後再查詢';
        }
    }

    // 全部刷新
    function refreshAll() {
        randomizeStatuses();
        renderMap();
        renderList();
        updateRecommendation();
    }

    // 初始加載
    renderMap();
    renderList();
    updateRecommendation();

    // 每30秒自動更新
    setInterval(refreshAll, 30000);
</script>

</body>
</html>
